<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TV Home</title>
  <style>
    /* Based on: https://paletton.com/#uid=73L1-0koVn+fbvUkhrcs2juygei
     * Accent (yellow) has increased saturation by 15 in paletton.
     */
    :root {
      color-scheme: light dark;
      /* DARK Color Scheme */
      /* Base (combines with all colors) */
      --color-base-c: #ffffff;
      --color-base-c-hover: #d3d3d3;
      --color-base: #201E1E;
      --color-base-1: #252121;
      --color-base-2: #302E2E;
      --color-base-hover: #403E3E;
      --color-base-hover-2: #504E4E;
      --color-base-font: #ffffff;
      --color-base-font-hover: #d3d3d3;
      --color-base-transparent: #333333BB;
      --color-base-transparent-2: #55555555;
      --color-base-disabled: #999999;
      /* Brand (combines with all font colors and brand-c) */
      --color-brand-c: #ffffff;
      --color-brand: #071C4C;
      --color-brand-selected: #162F68;
      --color-brand-hover: #031233;
      --color-brand-font: #6278AA;
      --color-brand-font-hover: #3F5891;
      --color-brand-font-dark: #6278AA;
      /* Accent */
      --color-accent-c: #ffffff;
      --color-accent: #E4A525;
      --color-accent-selected: #F3BE54;
      --color-accent-hover: #BC810D;
      --color-accent-font: #E4A525;
      --color-accent-font-hover: #BC810D;
      /* Bad */
      --color-bad-c: #ffffff;
      --color-bad: #A52556;
      --color-bad-selected: #BB4573;
      --color-bad-hover: #86113E;
      --color-bad-font: #BB4573;
      --color-bad-font-hover: #A52556;
      /* Good */
      --color-good-c: #ffffff;
      --color-good: #6FAD26;
      --color-good-selected: #8BC548;
      --color-good-hover: #548D11;    
      --color-good-font: #8BC548;
      --color-good-font-hover: #6FAD26;
      /* Other */
      --color-subtle-gray: #302E2E;
      --color-contrast-gray: #7e7e7e;
      --color-shadow-color: rgba(0, 0, 0, 0.5);
      --color-debug: #e100ff;
      --radius: 0.3em;
      --radius-large: 0.5em;
      --radius-round: 9999em;
      color: var(--color-base-c);
      fill: var(--color-base-c);
      background-color: var(--color-base);
    }

    @media (prefers-color-scheme: light) {
      :root {
        /* LIGHT Color Scheme */
        --color-base-c: #201E1E;
        --color-base-c-hover: #302E2E;
        --color-base: #ffffff;
        --color-base-1: #f8f8f8;
        --color-base-2: #efefef;
        --color-base-hover: #d3d3d3;
        --color-base-hover-2: #c3c3c3;
        --color-base-font: #201E1E;
        --color-base-font-hover: #302E2E;
        --color-base-transparent: #ffffffBB;
        --color-base-transparent-2: #55555555;
        --color-brand-font-dark: #071C4C;
        --color-subtle-gray: #efefef;
        --color-contrast-gray: #AAAAAA;
        --color-shadow-color: rgba(0, 0, 0, 0.15);
        color: var(--color-base-c);
        fill: var(--color-base-c);
        background-color: var(--color-base);
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--color-base);
      color: var(--color-base-c);
      padding: 3vw;
      min-height: 100vh;
    }

    .container {
      margin: 0 auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 3vw;
    }

    h1 {
      font-size: 2.5em;
    }

    .settings-btn {
      padding: 0.8vw 1.8vw;
      font-size: 1em;
      background: var(--color-base-hover);
      color: var(--color-base-c);
      border: none;
      border-radius: 0.6vw;
      cursor: pointer;
      transition: background 0.2s;
    }

    .settings-btn:hover {
      background: var(--color-base-hover-2);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(18vw, 18vw));
      gap: 2vw;
      margin-bottom: 3vw;
      justify-content: center;
    }

    .app-btn {
      aspect-ratio: 1;
      background: var(--color-base-2);
      border: 0.2vw solid var(--color-base-hover-2);
      border-radius: 0.8vw;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      gap: 0;
      padding: 0;
      text-align: center;
      transition: all 0.2s;
      font-size: 1.1em;
      font-weight: 500;
      color: var(--color-base-c);
      overflow: hidden;
      position: relative;
    }

    .app-btn:hover {
      border-color: var(--color-accent);
      background: var(--color-base-hover);
    }

    .app-btn.focused {
      border-color: var(--color-accent);
      background: var(--color-base-hover);
      box-shadow: 0 0 20px var(--color-shadow-color);
    }

    .app-logo {
      width: 85%;
      height: 85%;
      border-radius: 0.5vw;
      object-fit: contain;
      background: transparent;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .app-name-banner {
      width: 100%;
      padding: 0.6vw 0.6vw;
      background: var(--color-base-transparent);
      color: var(--color-base-c);
      font-size: 0.85em;
      font-weight: 600;
      text-align: center;
      z-index: 10;
      position: relative;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--color-shadow-color);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.open {
      display: flex;
    }

    .modal-content {
      background: var(--color-base-2);
      padding: 2vw;
      border-radius: 0.8vw;
      max-width: 500px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal h2 {
      margin-bottom: 1.5vw;
    }

    .form-group {
      margin-bottom: 1.2vw;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.4vw;
      font-weight: 500;
    }

    .form-group input {
      width: 100%;
      padding: 0.8vw;
      background: var(--color-base-1);
      border: 0.1vw solid var(--color-base-hover);
      border-radius: 0.4vw;
      color: var(--color-base-c);
      font-size: 1em;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--color-accent);
    }

    .btn-group {
      display: flex;
      gap: 0.8vw;
      margin-bottom: 1.5vw;
    }

    .btn-group button {
      flex: 1;
      padding: 0.8vw;
      background: var(--color-base-hover);
      color: var(--color-base-c);
      border: none;
      border-radius: 0.4vw;
      cursor: pointer;
      font-size: 1em;
    }

    .btn-group button:hover {
      background: var(--color-base-hover-2);
    }

    .btn-group button.primary {
      background: var(--color-accent);
      color: var(--color-accent-c);
    }

    .btn-group button.primary:hover {
      background: var(--color-accent-selected);
      color: var(--color-accent-c);
    }

    .app-list {
      border-top: 0.1vw solid var(--color-base-hover);
      padding-top: 1.5vw;
    }

    .app-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.8vw;
      background: var(--color-base-1);
      border-radius: 0.4vw;
      margin-bottom: 0.6vw;
    }

    .app-item button {
      padding: 0.5vw 1vw;
      background: var(--color-bad);
      color: var(--color-bad-c);
      border: none;
      border-radius: 0.3vw;
      cursor: pointer;
      font-size: 0.9em;
      margin-left: 0.5vw;
    }

    .app-item button:hover {
      background: var(--color-bad-selected);
    }

    .app-item button.reorder-btn {
      padding: 0.5vw 0.8vw;
      background: var(--color-brand);
      color: var(--color-brand-c);
    }

    .app-item button.reorder-btn:hover {
      background: var(--color-brand-selected);
    }

    .app-item button.reorder-btn:disabled {
      background: var(--color-base-disabled);
      cursor: not-allowed;
      opacity: 0.5;
    }

    .app-item-controls {
      display: flex;
      gap: 0.4vw;
      align-items: center;
    }

    .modal-footer {
      margin-top: 1.5vw;
      padding-top: 1.5vw;
      border-top: 0.1vw solid var(--color-base-hover);
      display: flex;
      gap: 0.8vw;
    }

    .modal-footer button {
      flex: 1;
      padding: 0.8vw;
      background: var(--color-base-hover);
      color: var(--color-base-c);
      border: none;
      border-radius: 0.4vw;
      cursor: pointer;
      font-size: 1em;
    }

    .modal-footer button:hover {
      background: var(--color-base-hover-2);
    }

    .modal-footer button.primary {
      background: var(--color-accent);
      color: var(--color-accent-c);
    }

    .modal-footer button.primary:hover {
      background: var(--color-accent-selected);
      color: var(--color-accent-c);
    }

    .backup-section {
      border-top: 0.1vw solid var(--color-base-hover);
      margin-top: 1.5vw;
      padding-top: 1.5vw;
    }

    .backup-section h3 {
      margin-bottom: 1vw;
    }

    .backup-textarea {
      width: 100%;
      height: 8vw;
      padding: 0.8vw;
      background: var(--color-base-1);
      border: 0.1vw solid var(--color-base-hover);
      border-radius: 0.4vw;
      color: var(--color-base-c);
      font-size: 0.85em;
      font-family: monospace;
      resize: vertical;
      margin-bottom: 0.8vw;
    }

    .backup-textarea:focus {
      outline: none;
      border-color: var(--color-accent);
    }

    .backup-buttons {
      display: flex;
      gap: 0.8vw;
      margin-bottom: 1vw;
    }

    .backup-buttons button {
      flex: 1;
      padding: 0.8vw;
      background: var(--color-base-hover);
      color: var(--color-base-c);
      border: none;
      border-radius: 0.4vw;
      cursor: pointer;
      font-size: 0.95em;
    }

    .backup-buttons button:hover {
      background: var(--color-base-hover-2);
    }

    .backup-buttons button.primary {
      background: var(--color-accent);
      color: var(--color-accent-c);
    }

    .backup-buttons button.primary:hover {
      background: var(--color-accent-selected);
    }

    .backup-buttons button.danger {
      background: var(--color-bad);
      color: var(--color-bad-c);
    }

    .backup-buttons button.danger:hover {
      background: var(--color-bad-selected);
    }

    .backup-message {
      padding: 0.8vw;
      border-radius: 0.4vw;
      margin-bottom: 1vw;
      display: none;
    }

    .backup-message.success {
      display: block;
      background: var(--color-good);
      color: var(--color-good-c);
    }

    .backup-message.error {
      display: block;
      background: var(--color-bad);
      color: var(--color-bad-c);
    }

    @media (max-width: 768px) {
      body {
        padding: 2vw;
      }

      h1 {
        font-size: 1.8em;
      }

      .grid {
        grid-template-columns: repeat(auto-fit, minmax(30vw, 30vw));
        gap: 1.5vw;
      }

      .app-btn {
        font-size: 0.9em;
      }

      .app-name-banner {
        font-size: 0.75em;
        padding: 0.4vw 0.4vw;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>TV Home</h1>
      <button class="settings-btn" onclick="openSettings()">Settings (ESC)</button>
    </div>

    <div class="grid" id="grid"></div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <h2>Settings</h2>

      <div class="form-group">
        <label for="appName">App Name</label>
        <input type="text" id="appName" placeholder="e.g., YouTube">
      </div>

      <div class="form-group">
        <label for="appUrl">App URL</label>
        <input type="text" id="appUrl" placeholder="e.g., https://www.youtube.com">
      </div>

      <div class="btn-group">
        <button class="primary" onclick="addApp()">Add App</button>
        <button onclick="resetApps()">Reset to Default</button>
      </div>

      <div class="app-list">
        <h3>Current Apps</h3>
        <div id="appsList"></div>
      </div>

      <div class="backup-section">
        <h3>Backup & Restore</h3>
        <div id="backupMessage" class="backup-message"></div>
        <textarea id="backupTextarea" class="backup-textarea" placeholder="Click 'Export' to copy your settings, or paste previously exported settings and click 'Import'"></textarea>
        <div class="backup-buttons">
          <button onclick="exportConfig()">Export Settings</button>
          <button class="danger" onclick="importConfig()">Import Settings</button>
        </div>
      </div>

      <div class="modal-footer">
        <button class="primary" onclick="closeSettings()">Close (ESC)</button>
      </div>
    </div>
  </div>

  <script>
    const DEFAULT_APPS = [
      { name: 'YouTube', url: 'https://www.youtube.com' }
    ];

    let apps = [];
    let focusIndex = 0;

    function getLogoUrl(url) {
      try {
        const domain = new URL(url).hostname;
        return `https://www.google.com/s2/favicons?domain=${domain}&sz=128`;
      } catch {
        return null;
      }
    }

    function loadApps() {
      const stored = localStorage.getItem('tvApps');
      apps = stored ? JSON.parse(stored) : DEFAULT_APPS;
      focusIndex = 0;
    }

    function saveApps() {
      localStorage.setItem('tvApps', JSON.stringify(apps));
    }

    function renderGrid() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      apps.forEach((app, index) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'app-btn' + (index === focusIndex ? ' focused' : '');
        btn.setAttribute('data-url', app.url);
        
        btn.addEventListener('click', function(e) {
          openApp(app.url);
        });
        
        btn.addEventListener('mouseover', () => setFocus(index));

        const logo = document.createElement('img');
        logo.className = 'app-logo';
        const logoUrl = getLogoUrl(app.url);
        if (logoUrl) {
          logo.src = logoUrl;
          logo.onerror = () => {
            logo.style.display = 'none';
          };
        } else {
          logo.style.display = 'none';
        }

        const banner = document.createElement('div');
        banner.className = 'app-name-banner';
        banner.textContent = app.name;

        btn.appendChild(logo);
        btn.appendChild(banner);
        grid.appendChild(btn);
      });
    }

    function renderAppsList() {
      const list = document.getElementById('appsList');
      list.innerHTML = '';

      apps.forEach((app, index) => {
        const item = document.createElement('div');
        item.className = 'app-item';
        item.innerHTML = `
          <div>${app.name}</div>
          <div class="app-item-controls">
            <button class="reorder-btn" onclick="moveAppUp(${index})" ${index === 0 ? 'disabled' : ''}>↑</button>
            <button class="reorder-btn" onclick="moveAppDown(${index})" ${index === apps.length - 1 ? 'disabled' : ''}>↓</button>
            <button onclick="removeApp(${index})">Remove</button>
          </div>
        `;
        list.appendChild(item);
      });
    }

    function setFocus(index) {
      focusIndex = index;
      // Update focus class without re-rendering
      document.querySelectorAll('.app-btn').forEach((btn, i) => {
        if (i === index) {
          btn.classList.add('focused');
        } else {
          btn.classList.remove('focused');
        }
      });
    }

    function moveFocus(direction) {
      const cols = Math.max(1, Math.floor(window.innerWidth / 230));
      const rows = Math.ceil(apps.length / cols);

      if (direction === 'up') {
        focusIndex = Math.max(0, focusIndex - cols);
      } else if (direction === 'down') {
        focusIndex = Math.min(apps.length - 1, focusIndex + cols);
      } else if (direction === 'left') {
        focusIndex = focusIndex > 0 ? focusIndex - 1 : focusIndex;
      } else if (direction === 'right') {
        focusIndex = focusIndex < apps.length - 1 ? focusIndex + 1 : focusIndex;
      }
      setFocus(focusIndex);
    }

    function openApp(url) {
      window.location.href = url;
    }

    function addApp() {
      const name = document.getElementById('appName').value.trim();
      const url = document.getElementById('appUrl').value.trim();

      if (!name || !url) {
        alert('Please enter both name and URL');
        return;
      }

      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        alert('URL must start with http:// or https://');
        return;
      }

      apps.push({ name, url });
      saveApps();
      document.getElementById('appName').value = '';
      document.getElementById('appUrl').value = '';
      renderAppsList();
      renderGrid();
    }

    function removeApp(index) {
      apps.splice(index, 1);
      saveApps();
      if (focusIndex >= apps.length) focusIndex = Math.max(0, apps.length - 1);
      renderAppsList();
      renderGrid();
    }

    function moveAppUp(index) {
      if (index > 0) {
        [apps[index], apps[index - 1]] = [apps[index - 1], apps[index]];
        saveApps();
        renderAppsList();
        renderGrid();
      }
    }

    function moveAppDown(index) {
      if (index < apps.length - 1) {
        [apps[index], apps[index + 1]] = [apps[index + 1], apps[index]];
        saveApps();
        renderAppsList();
        renderGrid();
      }
    }

    function exportConfig() {
      const config = {
        version: '1.0',
        exportDate: new Date().toISOString(),
        apps: apps
      };
      const jsonString = JSON.stringify(config, null, 2);
      const textarea = document.getElementById('backupTextarea');
      textarea.value = jsonString;
      textarea.select();
      
      showBackupMessage('Settings exported! Copy the text above.', 'success');
    }

    function importConfig() {
      const textarea = document.getElementById('backupTextarea');
      const jsonString = textarea.value.trim();
      
      if (!jsonString) {
        showBackupMessage('Please paste your exported settings first.', 'error');
        return;
      }

      try {
        const config = JSON.parse(jsonString);
        
        if (!config.apps || !Array.isArray(config.apps)) {
          throw new Error('Invalid configuration format');
        }

        if (config.apps.length === 0) {
          throw new Error('Configuration has no apps');
        }

        // Validate each app has name and url
        config.apps.forEach((app, index) => {
          if (!app.name || !app.url) {
            throw new Error(`App ${index + 1} is missing name or URL`);
          }
        });

        apps = config.apps;
        saveApps();
        focusIndex = 0;
        renderAppsList();
        renderGrid();
        
        textarea.value = '';
        showBackupMessage(`Successfully imported ${apps.length} app(s)!`, 'success');
      } catch (error) {
        showBackupMessage(`Import failed: ${error.message}`, 'error');
      }
    }

    function showBackupMessage(text, type) {
      const messageDiv = document.getElementById('backupMessage');
      messageDiv.textContent = text;
      messageDiv.className = `backup-message ${type}`;
      
      setTimeout(() => {
        messageDiv.className = 'backup-message';
      }, 4000);
    }

    function resetApps() {
      if (confirm('Reset to default apps?')) {
        apps = JSON.parse(JSON.stringify(DEFAULT_APPS));
        saveApps();
        focusIndex = 0;
        renderAppsList();
        renderGrid();
      }
    }

    function openSettings() {
      document.getElementById('modal').classList.add('open');
      renderAppsList();
      document.getElementById('appName').focus();
    }

    function closeSettings() {
      document.getElementById('modal').classList.remove('open');
      renderGrid();
    }

    document.addEventListener('keydown', (e) => {
      const modal = document.getElementById('modal');
      if (modal.classList.contains('open')) {
        if (e.key === 'Escape') {
          closeSettings();
        }
        return;
      }

      if (e.key === 'ArrowUp') {
        e.preventDefault();
        moveFocus('up');
      } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        moveFocus('down');
      } else if (e.key === 'ArrowLeft') {
        e.preventDefault();
        moveFocus('left');
      } else if (e.key === 'ArrowRight') {
        e.preventDefault();
        moveFocus('right');
      } else if (e.key === 'Enter') {
        e.preventDefault();
        openApp(apps[focusIndex].url);
      } else if (e.key === 'Escape') {
        openSettings();
      }
    });

    loadApps();
    renderGrid();
  </script>
</body>
</html>
